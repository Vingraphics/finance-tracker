<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kelvin's Finance Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1A2E4A;--navy2:#243d61;--gold:#D4A017;--gold2:#f5c842;
  --green:#1B6B3A;--green-bg:#D8F3DC;--red:#C0392B;--red-bg:#FDECEA;
  --gold-bg:#FFF3CD;--blue-bg:#E8EEF4;
  --bg:#F4F2EE;--surface:#FFFFFF;--surface2:#F0EDE8;
  --border:rgba(26,46,74,0.12);--text:#1A2E4A;--text2:#6B7280;--text3:#9CA3AF;
  --r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}
.app-header{background:var(--navy);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-title{color:var(--gold);font-size:15px;font-weight:600}
.app-date{color:rgba(255,255,255,0.35);font-size:11px;margin-top:2px}
.sync-row{display:flex;align-items:center;gap:6px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.sync-dot.ok{background:#27AE60}.sync-dot.busy{background:var(--gold);animation:pulse 1s infinite}.sync-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.sync-txt{font-size:10px;color:rgba(255,255,255,0.4)}

.tab-bar{background:var(--surface);display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;font-weight:500}
.tab.on{color:var(--navy);border-bottom-color:var(--gold)}

.tab-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.body{padding:16px}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stat{background:var(--surface);border-radius:var(--rs);padding:13px;border:1px solid var(--border)}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px}
.stat-val{font-size:17px;font-weight:600;font-family:'DM Mono',monospace}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-gold{color:#9A7010}.c-navy{color:var(--navy)}

.sec-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin:14px 0 9px}
.entry-card{background:var(--surface);border-radius:var(--rs);border:1px solid var(--border);margin-bottom:8px}
.entry-row{display:flex;align-items:center;padding:11px 13px;gap:10px}
.entry-row+.entry-row{border-top:1px solid var(--border)}
.entry-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.entry-icon.income{background:var(--green-bg)}.entry-icon.expense{background:var(--red-bg)}
.entry-icon.savings{background:var(--gold-bg)}.entry-icon.business{background:var(--blue-bg)}
.entry-info{flex:1;min-width:0}
.entry-desc{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-meta{font-size:11px;color:var(--text3);margin-top:2px}
.entry-right{display:flex;align-items:center;gap:2px;flex-shrink:0}
.entry-amt{font-size:13px;font-weight:600;font-family:'DM Mono',monospace}
.del-btn{background:none;border:none;color:var(--text3);font-size:17px;cursor:pointer;padding:4px 6px;line-height:1}
.edit-btn{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:4px 6px;line-height:1}
.edit-btn:hover{color:var(--navy)}
.empty{text-align:center;padding:36px 20px;color:var(--text3);font-size:13px;line-height:1.8}

.bar-wrap{margin-bottom:11px}
.bar-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.bar-track{background:var(--surface2);border-radius:4px;height:7px;overflow:hidden}
.bar-fill{height:7px;border-radius:4px;transition:width 0.5s ease}

.fab{position:fixed;bottom:20px;right:50%;transform:translateX(50%);max-width:448px;width:calc(100% - 32px);background:var(--navy);color:var(--gold);border:none;border-radius:var(--rs);padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;z-index:10;display:flex;align-items:center;justify-content:center;gap:8px}

#screen-add{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column;max-width:480px;margin:0 auto}
#screen-add.open{display:flex}
.add-header{background:var(--navy);padding:13px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.back-btn{background:none;border:none;color:var(--gold);font-size:22px;cursor:pointer;line-height:1;padding:0}
.add-title{color:var(--gold);font-size:15px;font-weight:600}
.add-body{flex:1;overflow-y:auto;padding:18px 16px 90px}

.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.type-btn{padding:11px 8px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text2);text-align:center;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;gap:4px}
.type-btn span{font-size:18px}
.type-btn.sel-expense{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.type-btn.sel-income{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.type-btn.sel-savings{background:var(--gold-bg);border-color:var(--gold);color:#9A7010}
.type-btn.sel-business{background:var(--blue-bg);border-color:var(--navy);color:var(--navy)}

.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px}
.field input,.field select{width:100%;border:1.5px solid var(--border);border-radius:var(--rs);padding:11px 13px;font-size:15px;color:var(--text);background:var(--surface);font-family:'DM Sans',sans-serif;outline:none}
.field input:focus,.field select:focus{border-color:var(--navy)}
.amt-wrap{position:relative}
.amt-prefix{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:600;color:var(--text3);pointer-events:none}
.amt-wrap input{padding-left:50px;font-family:'DM Mono',monospace;font-size:20px;font-weight:500}

.save-btn{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:var(--navy);color:var(--gold);border:none;border-radius:var(--rs);padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;z-index:10}
.save-btn:disabled{opacity:0.5;cursor:not-allowed}

.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(212,160,23,0.3);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

.month-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;padding:12px 0 7px;display:flex;align-items:center;gap:8px}
.month-title::after{content:'';flex:1;height:1px;background:var(--border)}
.filter-sel{width:100%;border:1.5px solid var(--border);border-radius:var(--rs);padding:11px 13px;font-size:14px;color:var(--text);background:var(--surface);font-family:'DM Sans',sans-serif;margin-bottom:14px;outline:none}
</style>
</head>
<body>

<div id="app">
  <div class="app-header">
    <div>
      <div class="app-title">Finance Tracker</div>
      <div class="app-date" id="header-date"></div>
    </div>
    <div class="sync-row">
      <div class="sync-dot" id="sync-dot"></div>
      <span class="sync-txt" id="sync-txt">loading...</span>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab on" onclick="showTab('log')">Today</div>
    <div class="tab" onclick="showTab('history')">History</div>
    <div class="tab" onclick="showTab('report')">Report</div>
  </div>

  <div class="tab-body">
    <div id="tab-log" class="body">
      <div class="stat-grid">
        <div class="stat"><div class="stat-label">Month income</div><div class="stat-val c-green" id="s-income">—</div></div>
        <div class="stat"><div class="stat-label">Month expenses</div><div class="stat-val c-red" id="s-expense">—</div></div>
        <div class="stat"><div class="stat-label">Net balance</div><div class="stat-val" id="s-net">—</div></div>
        <div class="stat"><div class="stat-label">Saved</div><div class="stat-val c-gold" id="s-savings">—</div></div>
      </div>
      <div class="sec-title">Today's entries</div>
      <div id="today-list"></div>
      <div style="height:72px"></div>
    </div>

    <div id="tab-history" class="body" style="display:none">
      <select class="filter-sel" id="filter-cat" onchange="renderHistory()">
        <option value="">All categories</option>
        <option>Income</option><option>Bills</option><option>Meals</option><option>Travel</option>
        <option>Car</option><option>Grooming</option><option>Household</option>
        <option>Entertainment</option><option>Clothing</option><option>Medical</option>
        <option>Business</option><option>Savings</option><option>Misc</option>
      </select>
      <div id="history-list"></div>
      <div style="height:72px"></div>
    </div>

    <div id="tab-report" class="body" style="display:none">
      <select class="filter-sel" id="report-month" onchange="renderReport()"></select>
      <div class="stat-grid" style="margin-bottom:16px">
        <div class="stat"><div class="stat-label">Income</div><div class="stat-val c-green" id="r-income">—</div></div>
        <div class="stat"><div class="stat-label">Expenses</div><div class="stat-val c-red" id="r-expense">—</div></div>
        <div class="stat"><div class="stat-label">Net</div><div class="stat-val" id="r-net">—</div></div>
        <div class="stat"><div class="stat-label">Savings</div><div class="stat-val c-gold" id="r-savings">—</div></div>
      </div>
      <div class="sec-title">Breakdown by category</div>
      <div id="report-bars"></div>
      <div style="height:72px"></div>
    </div>
  </div>

  <button class="fab" onclick="showAdd()">+ Log Entry</button>
</div>

<div id="screen-add">
  <div class="add-header">
    <button class="back-btn" onclick="closeAdd()">&#8592;</button>
    <div class="add-title" id="add-title">New Entry</div>
  </div>
  <div class="add-body">
    <div class="type-grid">
      <div class="type-btn sel-expense" id="t-expense" onclick="selType('expense')"><span>🛒</span>Expense</div>
      <div class="type-btn" id="t-income" onclick="selType('income')"><span>💰</span>Income</div>
      <div class="type-btn" id="t-savings" onclick="selType('savings')"><span>💾</span>Savings</div>
      <div class="type-btn" id="t-business" onclick="selType('business')"><span>📦</span>Business</div>
    </div>
    <div class="field">
      <label>Amount (KES)</label>
      <div class="amt-wrap">
        <span class="amt-prefix">KES</span>
        <input type="number" id="amt" placeholder="0" inputmode="decimal" min="0">
      </div>
    </div>
    <div class="field">
      <label>Category</label>
      <select id="cat">
        <option value="Meals">🍽️  Meals & Food</option>
        <option value="Bills">🧾  Bills & Utilities</option>
        <option value="Travel">✈️  Travel</option>
        <option value="Car">⛽  Car & Fuel</option>
        <option value="Grooming">💈  Personal Grooming</option>
        <option value="Household">🏠  Household</option>
        <option value="Entertainment">🎭  Entertainment</option>
        <option value="Clothing">👔  Clothing</option>
        <option value="Medical">💊  Medical</option>
        <option value="Misc">🎲  Miscellaneous</option>
        <option value="Business">📦  Vin Graphics / Business</option>
        <option value="Income">💰  Income</option>
        <option value="Savings">💾  Savings / Goals</option>
      </select>
    </div>
    <div class="field">
      <label>Description</label>
      <input type="text" id="desc" placeholder="e.g. Petrol – Total, Lunch – Java">
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="entry-date">
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <input type="text" id="notes" placeholder="Any extra detail">
    </div>
  </div>
  <button class="save-btn" id="save-btn" onclick="saveEntry()">Save Entry</button>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-4Nm2zj5h8ZONQO4epD6V_RC-ijApTdFOk3QMA-hEckLFaif3eG5NjWYIdUmeEu5bUA/exec';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const ICONS = {Meals:'🍽️',Bills:'🧾',Travel:'✈️',Car:'⛽',Grooming:'💈',Household:'🏠',Entertainment:'🎭',Clothing:'👔',Medical:'💊',Misc:'🎲',Business:'📦',Income:'💰',Savings:'💾'};
const CAT_COLORS = {Income:'#1B6B3A',Savings:'#9A7010',Business:'#1A2E4A'};

let entries = [], selectedType = 'expense', editingId = null;

const $ = id => document.getElementById(id);
function today(){ return new Date().toISOString().split('T')[0]; }
function fmt(n){ return 'KES ' + Math.round(Math.abs(n)).toLocaleString(); }
function monthKey(d){ const dt = new Date(d); return MONTHS[dt.getMonth()] + ' ' + dt.getFullYear(); }
function thisMonth(){ return monthKey(today()); }
function typeOf(e){ return e.type || 'expense'; }

function setSyncStatus(s, l){
  $('sync-dot').className = 'sync-dot ' + s;
  $('sync-txt').textContent = l;
}

function saveLocal(){ localStorage.setItem('kfin_v4', JSON.stringify(entries)); }
function loadLocal(){ try{ entries = JSON.parse(localStorage.getItem('kfin_v4') || '[]'); }catch(e){ entries = []; } }

async function loadFromSheet(){
  setSyncStatus('busy', 'syncing...');
  try {
    const res = await fetch(SCRIPT_URL);
    const rows = await res.json();
    // Skip header row, map remaining rows
    entries = rows.slice(1).filter(r => r[0]).map(r => ({
      id: String(r[0]),
      date: r[1] || '',
      cat: r[2] || '',
      desc: r[3] || '',
      type: r[4] || 'expense',
      amt: parseFloat(r[5]) || 0,
      month: r[6] || '',
      year: r[7] || '',
      notes: r[8] || ''
    }));
    saveLocal();
    setSyncStatus('ok', 'synced');
  } catch(e) {
    loadLocal();
    setSyncStatus('err', 'offline — showing cached');
  }
  updateStats();
  renderToday();
}

async function postToSheet(payload){
  await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(payload)
  });
}

function entryHTML(e, showDate = false){
  const t = typeOf(e);
  const ic = ICONS[e.cat] || '💸';
  const amtCls = t==='income' ? 'c-green' : t==='savings' ? 'c-gold' : 'c-red';
  const sign = t==='income' ? '+' : '-';
  return `<div class="entry-row">
    <div class="entry-icon ${t}">${ic}</div>
    <div class="entry-info">
      <div class="entry-desc">${e.desc || e.cat}</div>
      <div class="entry-meta">${e.cat}${showDate ? ' · ' + e.date : ''}${e.notes ? ' · ' + e.notes : ''}</div>
    </div>
    <div class="entry-right">
      <div class="entry-amt ${amtCls}">${sign}${fmt(e.amt)}</div>
      <button class="edit-btn" onclick="editEntry('${e.id}')" title="Edit">✏️</button>
      <button class="del-btn" onclick="delEntry('${e.id}')">×</button>
    </div>
  </div>`;
}

function updateStats(){
  const mk = thisMonth(); let inc=0, exp=0, sav=0;
  entries.forEach(e => {
    if(monthKey(e.date) !== mk) return;
    const t = typeOf(e);
    if(t==='income') inc+=e.amt; else if(t==='savings') sav+=e.amt; else exp+=e.amt;
  });
  $('s-income').textContent = fmt(inc);
  $('s-expense').textContent = fmt(exp);
  const net = inc - exp;
  $('s-net').textContent = (net >= 0 ? '+' : '-') + fmt(net);
  $('s-net').className = 'stat-val ' + (net >= 0 ? 'c-green' : 'c-red');
  $('s-savings').textContent = fmt(sav);
}

function renderToday(){
  const t = today();
  const list = entries.filter(e => e.date === t).reverse();
  const el = $('today-list');
  if(!list.length){ el.innerHTML = '<div class="empty">Nothing logged today yet<br><span style="font-size:12px">Tap + Log Entry below</span></div>'; return; }
  el.innerHTML = `<div class="entry-card">${list.map(e => entryHTML(e)).join('')}</div>`;
}

function renderHistory(){
  const cf = $('filter-cat').value;
  let filtered = [...entries].sort((a,b) => b.date.localeCompare(a.date));
  if(cf) filtered = filtered.filter(e => e.cat === cf);
  const el = $('history-list');
  if(!filtered.length){ el.innerHTML = '<div class="empty">No entries found</div>'; return; }
  const grouped = {};
  filtered.forEach(e => { const mk = monthKey(e.date); (grouped[mk] = grouped[mk]||[]).push(e); });
  el.innerHTML = Object.keys(grouped).map(mk => `
    <div class="month-title">${mk}</div>
    <div class="entry-card">${grouped[mk].map(e => entryHTML(e, true)).join('')}</div>
  `).join('');
}

function renderReport(){
  const sel = $('report-month').value || thisMonth();
  const month = entries.filter(e => monthKey(e.date) === sel);
  let inc=0, exp=0, sav=0; const cats = {};
  month.forEach(e => {
    const t = typeOf(e);
    if(t==='income') inc+=e.amt; else if(t==='savings') sav+=e.amt; else exp+=e.amt;
    cats[e.cat] = (cats[e.cat]||0) + e.amt;
  });
  $('r-income').textContent = fmt(inc);
  $('r-expense').textContent = fmt(exp);
  const net = inc - exp;
  $('r-net').textContent = (net >= 0 ? '+' : '-') + fmt(net);
  $('r-net').className = 'stat-val ' + (net >= 0 ? 'c-green' : 'c-red');
  $('r-savings').textContent = fmt(sav);
  const maxV = Math.max(...Object.values(cats), 1);
  $('report-bars').innerHTML = Object.keys(cats).length ?
    Object.keys(cats).sort((a,b) => cats[b]-cats[a]).map(cat => {
      const pct = Math.round(cats[cat]/maxV*100);
      const col = CAT_COLORS[cat] || '#C0392B';
      return `<div class="bar-wrap">
        <div class="bar-top"><span>${ICONS[cat]||''} ${cat}</span><span style="font-weight:600;font-family:'DM Mono',monospace">${fmt(cats[cat])}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
      </div>`;
    }).join('') : '<div class="empty">No data for this period</div>';
}

function populateMonthSelect(){
  const months = [...new Set(entries.map(e => monthKey(e.date)))].sort((a,b) => new Date('1 '+b) - new Date('1 '+a));
  if(!months.includes(thisMonth())) months.unshift(thisMonth());
  $('report-month').innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
}

function showTab(tab){
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('on', ['log','history','report'][i]===tab));
  ['log','history','report'].forEach(t => { $('tab-'+t).style.display = t===tab ? 'block' : 'none'; });
  if(tab==='history') renderHistory();
  if(tab==='report'){ populateMonthSelect(); renderReport(); }
}

function showAdd(){
  editingId = null;
  $('add-title').textContent = 'New Entry';
  $('screen-add').classList.add('open');
  $('entry-date').value = today();
  $('amt').value = ''; $('desc').value = ''; $('notes').value = '';
  $('save-btn').textContent = 'Save Entry'; $('save-btn').disabled = false;
  selType('expense');
  setTimeout(() => $('amt').focus(), 100);
}

function editEntry(id){
  const e = entries.find(e => String(e.id) === String(id));
  if(!e) return;
  editingId = id;
  $('add-title').textContent = 'Edit Entry';
  $('screen-add').classList.add('open');
  $('entry-date').value = e.date;
  $('amt').value = e.amt;
  $('desc').value = e.desc || '';
  $('notes').value = e.notes || '';
  $('cat').value = e.cat;
  $('save-btn').textContent = 'Update Entry'; $('save-btn').disabled = false;
  selType(e.type || 'expense');
}

function closeAdd(){ $('screen-add').classList.remove('open'); }

function selType(t){
  selectedType = t;
  ['expense','income','savings','business'].forEach(x => {
    $('t-'+x).className = 'type-btn' + (x===t ? ' sel-'+x : '');
  });
  const cs = $('cat');
  if(t==='income') cs.value='Income';
  else if(t==='savings') cs.value='Savings';
  else if(t==='business') cs.value='Business';
  else if(['Income','Savings','Business'].includes(cs.value)) cs.value='Meals';
}

async function saveEntry(){
  const amt = parseFloat($('amt').value);
  const desc = $('desc').value.trim();
  const date = $('entry-date').value;
  const cat = $('cat').value;
  const notes = $('notes').value.trim();
  if(!amt || amt <= 0){ alert('Enter a valid amount'); return; }
  if(!date){ alert('Pick a date'); return; }
  const d = new Date(date);
  const btn = $('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Saving...';

  if(editingId) {
    // EDIT MODE — update existing entry
    const idx = entries.findIndex(e => String(e.id) === String(editingId));
    if(idx > -1){
      entries[idx] = { ...entries[idx], date, cat, desc, type: selectedType, amt,
        month: MONTHS[d.getMonth()], year: String(d.getFullYear()), notes };
      saveLocal();
      closeAdd(); updateStats(); renderToday(); renderHistory();
      try {
        setSyncStatus('busy', 'syncing...');
        await postToSheet({ action: 'update', id: editingId,
          row: [editingId, date, cat, desc, selectedType, amt, MONTHS[d.getMonth()], String(d.getFullYear()), notes] });
        setSyncStatus('ok', 'synced');
      } catch(e){ setSyncStatus('err', 'sync error'); }
    }
  } else {
    // ADD MODE — new entry
    const entry = {
      id: String(Date.now()), date, cat, desc,
      type: selectedType, amt,
      month: MONTHS[d.getMonth()],
      year: String(d.getFullYear()),
      notes
    };
    entries.push(entry);
    saveLocal();
    closeAdd(); updateStats(); renderToday();
    try {
      setSyncStatus('busy', 'syncing...');
      await postToSheet({ action: 'append', row: [entry.id, entry.date, entry.cat, entry.desc, entry.type, entry.amt, entry.month, entry.year, entry.notes] });
      setSyncStatus('ok', 'synced');
    } catch(e){ setSyncStatus('err', 'saved locally'); }
  }
}

async function delEntry(id){
  if(!confirm('Delete this entry?')) return;
  entries = entries.filter(e => String(e.id) !== String(id));
  saveLocal(); updateStats(); renderToday(); renderHistory();
  try {
    setSyncStatus('busy', 'syncing...');
    await postToSheet({ action: 'delete', id });
    setSyncStatus('ok', 'synced');
  } catch(e) {
    setSyncStatus('err', 'sync error');
  }
}

// Boot
$('header-date').textContent = new Date().toDateString();
loadFromSheet();
</script>
